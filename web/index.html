<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>不完全将棋</title>
  <link rel="stylesheet" href="style.css?v=0.12.6">
</head>
<body>
  <div id="container">
    <h1>不完全将棋</h1>
    <p id="phase-label"></p>
    <p id="move-display"></p>
    <p id="event-label"></p>
    <p id="archive-info"></p>
    <div id="watch-link-row">
      <span id="watch-link-text"></span>
      <button id="btn-copy-watch-link" hidden>観戦リンクをコピー</button>
    </div>
    <div id="record-info-row">
      <span id="record-info-text"></span>
      <button id="btn-copy-record-link" hidden>記録リンクをコピー</button>
    </div>
    <div id="board-wrap">
      <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="promotion-overlay">
        <p id="promotion-label">成りますか？</p>
        <div id="promotion-buttons">
          <button id="btn-promote">成</button>
          <button id="btn-no-promote">不成</button>
        </div>
      </div>
    </div>
    <div id="controls">
      <button id="btn-prev">← 前</button>
      <span id="step-label"></span>
      <button id="btn-next">次 →</button>
    </div>
    <div id="kifu-controls">
      <button id="btn-online">対戦</button>
      <button id="btn-resign">投了</button>
      <button id="btn-save">棋譜を保存</button>
      <button id="btn-load">棋譜を読込</button>
      <button id="btn-leave-watch" hidden>観戦をやめる</button>
      <input id="input-file" type="file" accept=".kifu,.txt,text/plain" hidden>
    </div>
  </div>

  <div id="load-modal">
    <div id="load-panel">
      <h2>棋譜を読込</h2>
      <p class="load-hint">ファイルを選ぶか、アーカイブ本文を貼り付けてください。</p>
      <div id="load-btns">
        <button id="btn-load-file">ファイルを選ぶ</button>
      </div>
      <textarea id="input-paste" placeholder="ここに棋譜アーカイブのテキストを貼り付け" spellcheck="false"></textarea>
      <div id="load-btns">
        <button id="btn-load-paste">貼り付けた内容を読込</button>
        <button id="btn-load-close">閉じる</button>
      </div>
    </div>
  </div>

  <div id="online-modal">
    <div id="online-panel">
      <h2>オンライン対戦</h2>
      <label class="online-field">
        <span>ルームキー</span>
        <input id="input-room" type="text" placeholder="合言葉を入力" autocomplete="off" spellcheck="false">
      </label>
      <label class="online-field">
        <span>パスワード</span>
        <input id="input-secret" type="password" placeholder="対戦相手と共有" autocomplete="off">
      </label>
      <p id="online-status">—</p>
      <div id="online-btns">
        <button id="btn-connect">入室</button>
        <button id="btn-online-close">閉じる</button>
      </div>
    </div>
  </div>

  <script type="module" src="board.js?v=0.12.6"></script>
</body>
</html>
