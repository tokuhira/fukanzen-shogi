# Cloudflare Worker + Durable Object — 不完全将棋 WebSocket 中継
# デプロイ: wrangler deploy
# ローカル: wrangler dev
name = "fukanzen-shogi-ws"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# 観戦トークン → roomKey の写像（淀川第三歩 §4）
[[kv_namespaces]]
binding = "SPECTATE_TOKENS"
id = "5d36ef96c86441d4ae851ad0a045bf07"
